<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overflow-x: hidden;
        }
        
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-container {
            display: none;
        }

        .step-container.active {
            display: block;
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Custom Toast */
        #toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            background: white;
            border-left: 4px solid #3b82f6;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            border-left-color: #ef4444;
        }

        .toast.success {
            border-left-color: #10b981;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="toast-container"></div>

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 relative overflow-hidden slide-up">
        
        <!-- Logo / Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-50 text-blue-600 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900" id="main-title">Acessar Conta</h2>
            <p class="text-sm text-gray-500 mt-2" id="main-subtitle">Insira seu e-mail para continuar</p>
        </div>

        <!-- Step 1: Email Input -->
        <div id="step-email" class="step-container active">
            <form id="form-email" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com" 
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-gray-900">
                </div>
                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2">
                    Continuar
                </button>
            </form>
        </div>

        <!-- Step 2: Verification Code -->
        <div id="step-code" class="step-container">
            <form id="form-code" class="space-y-4">
                <div>
                    <label for="code" class="block text-sm font-medium text-gray-700 mb-1">Código de 6 dígitos</label>
                    <div class="text-xs text-gray-500 mb-3">Enviamos um código para <span id="display-email-code" class="font-semibold text-gray-700"></span></div>
                    <input type="text" id="code" required maxlength="6" pattern="\d{6}" placeholder="000000" autocomplete="one-time-code"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-center text-2xl tracking-widest font-mono text-gray-900">
                </div>
                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors">
                    Verificar Código
                </button>
                <button type="button" onclick="goToStep('email')" class="w-full text-sm text-gray-500 hover:text-gray-700 py-2">
                    Voltar
                </button>
            </form>
        </div>

        <!-- Step 3: Create Password -->
        <div id="step-create-password" class="step-container">
            <form id="form-create-password" class="space-y-4">
                <div>
                    <label for="new-password" class="block text-sm font-medium text-gray-700 mb-1">Crie uma Senha</label>
                    <div class="text-xs text-gray-500 mb-3">Para o e-mail: <span id="display-email-create" class="font-semibold text-gray-700"></span></div>
                    <input type="password" id="new-password" required placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-gray-900">
                    <p class="text-xs text-gray-500 mt-2 flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        Deve conter pelo menos um número ou símbolo
                    </p>
                </div>
                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors">
                    Registrar e Entrar
                </button>
            </form>
        </div>

        <!-- Step 4: Login Password -->
        <div id="step-login-password" class="step-container">
            <form id="form-login-password" class="space-y-4">
                <div>
                    <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <div class="text-xs text-gray-500 mb-3">Bem-vindo de volta, <span id="display-email-login" class="font-semibold text-gray-700"></span></div>
                    <input type="password" id="login-password" required placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-gray-900">
                </div>
                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors">
                    Entrar
                </button>
                <button type="button" onclick="goToStep('email')" class="w-full text-sm text-gray-500 hover:text-gray-700 py-2">
                    Entrar com outra conta
                </button>
            </form>
        </div>

        <!-- Step 5: Logged In Success -->
        <div id="step-success" class="step-container text-center py-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 text-green-500 mb-4 mx-auto">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">Sucesso!</h3>
            <p class="text-gray-600 mb-6">Você está autenticado no sistema.</p>
            <button onclick="logout()" 
                class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium py-3 px-4 rounded-lg transition-colors">
                Sair
            </button>
        </div>

    </div>

    <script>
        /**
         * Banco de dados em memória para simular o armazenamento de usuários.
         * Formato: { "usuario@gmail.com": { password: "..." } }
         */
        const usersDatabase = new Map();
        
        // Estado global da aplicação
        let currentEmail = '';
        let generatedCode = '';

        // Referências DOM
        const titleEl = document.getElementById('main-title');
        const subtitleEl = document.getElementById('main-subtitle');
        const toastContainer = document.getElementById('toast-container');

        // Configuração de Títulos por Etapa
        const stepConfigs = {
            'email': { title: 'Acessar Conta', subtitle: 'Insira seu e-mail para continuar' },
            'code': { title: 'Verificação', subtitle: 'Confirme sua identidade' },
            'create-password': { title: 'Criar Senha', subtitle: 'Proteja sua nova conta' },
            'login-password': { title: 'Bem-vindo de volta', subtitle: 'Insira sua senha para acessar' },
            'success': { title: 'Área Restrita', subtitle: 'Acesso liberado' }
        };

        
        // Sistema de Notificações (Toast) para evitar o uso de alert()
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = '';
            if(type === 'error') {
                icon = `<svg class="w-5 h-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
            } else if (type === 'success') {
                icon = `<svg class="w-5 h-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>`;
            } else {
                icon = `<svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
            }

            toast.innerHTML = `${icon} <span class="text-sm font-medium text-gray-800">${message}</span>`;
            toastContainer.appendChild(toast);

            // Animate in
            setTimeout(() => toast.classList.add('show'), 10);

            // Remove after 4 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Navegação entre os passos do formulário
        function goToStep(stepId) {
            document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
            document.getElementById(`step-${stepId}`).classList.add('active');
            
            if(stepConfigs[stepId]) {
                titleEl.textContent = stepConfigs[stepId].title;
                subtitleEl.textContent = stepConfigs[stepId].subtitle;
            }

            // Focar no input correto dependendo da etapa
            setTimeout(() => {
                const activeInput = document.querySelector(`#step-${stepId} input`);
                if(activeInput) activeInput.focus();
            }, 100);
        }


        // 1. Processar E-mail
        document.getElementById('form-email').addEventListener('submit', (e) => {
            e.preventDefault();
            const emailInput = document.getElementById('email').value.trim().toLowerCase();
            
            // Validação simples de e-mail
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput)) {
                return showToast('Por favor, insira um e-mail válido.', 'error');
            }

            currentEmail = emailInput;

            // Lógica principal solicitada:
            // Se já existe, pede apenas a senha.
            // Se não existe, envia código para registrar.
            if (usersDatabase.has(currentEmail)) {
                document.getElementById('display-email-login').textContent = currentEmail;
                document.getElementById('login-password').value = '';
                goToStep('login-password');
            } else {
                // Simula o envio de um código (exibe na tela para testes)
                generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
                document.getElementById('display-email-code').textContent = currentEmail;
                document.getElementById('code').value = '';
                
                showToast(`(Simulação) Código enviado: ${generatedCode}`, 'info');
                goToStep('code');
            }
        });

        // 2. Processar Código de Verificação
        document.getElementById('form-code').addEventListener('submit', (e) => {
            e.preventDefault();
            const codeInput = document.getElementById('code').value.trim();

            if (codeInput === generatedCode) {
                document.getElementById('display-email-create').textContent = currentEmail;
                document.getElementById('new-password').value = '';
                goToStep('create-password');
            } else {
                showToast('Código incorreto. Tente novamente.', 'error');
            }
        });


        // 3. Processar Criação de Senha (Novo Usuário)
        document.getElementById('form-create-password').addEventListener('submit', (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;

            // Regra: A senha tem que ter pelo menos um número ou símbolo
            // \d verifica números, \W verifica caracteres não-alfanuméricos (símbolos)
            // Usamos uma regex explícita para garantir precisão.
            const hasNumberOrSymbol = /[0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(newPassword);

            if (!hasNumberOrSymbol) {
                return showToast('A senha deve conter pelo menos um número ou símbolo.', 'error');
            }
            if (newPassword.length < 6) {
                return showToast('A senha deve ter no mínimo 6 caracteres.', 'error');
            }

            // Salvar no "banco de dados" e fazer login
            usersDatabase.set(currentEmail, { password: newPassword });
            showToast('Conta registrada e logada com sucesso!', 'success');
            goToStep('success');
        });

        // 4. Processar Login com Senha (Usuário Existente)
        document.getElementById('form-login-password').addEventListener('submit', (e) => {
            e.preventDefault();
            const loginPassword = document.getElementById('login-password').value;
            const userAccount = usersDatabase.get(currentEmail);

            if (userAccount && userAccount.password === loginPassword) {
                showToast('Login efetuado com sucesso!', 'success');
                goToStep('success');
            } else {
                showToast('Senha incorreta.', 'error');
            }
        });

        // 5. Logout (Para testar o fluxo novamente)
        function logout() {
            currentEmail = '';
            generatedCode = '';
            document.getElementById('email').value = '';
            goToStep('email');
            showToast('Você saiu da conta.', 'info');
        }

    </script>
</body>
</html>
